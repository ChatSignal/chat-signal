<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Signal Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Chat Signal</h1>
      <p class="subtitle">Settings</p>
    </header>

    <form id="settings-form">
      <!-- Topic Detection -->
      <section class="setting-group">
        <h2>Topic Detection</h2>

        <div class="setting-row">
          <label for="topic-min-count">
            <span class="setting-name">Minimum mentions</span>
            <span class="setting-description">Words must appear this many times to show as trending</span>
          </label>
          <div class="input-group">
            <input type="range" id="topic-min-count" min="1" max="20" value="5">
            <span class="value-display" id="topic-min-count-value">5</span>
          </div>
        </div>

        <div class="setting-row">
          <label for="analysis-window-size">
            <span class="setting-name">Messages to analyze</span>
            <span class="setting-description">How many recent messages the engine sees per analysis pass</span>
            <span id="analysis-window-warning" class="setting-warning hidden">
              At low values, topics and sentiment may be less accurate
            </span>
          </label>
          <div class="input-group">
            <input type="range" id="analysis-window-size" min="50" max="1000" step="50" value="500">
            <span class="value-display" id="analysis-window-size-value">500</span>
            <span class="value-estimate" id="analysis-window-size-estimate">~2m of active chat</span>
          </div>
        </div>
      </section>

      <!-- Spam Detection -->
      <section class="setting-group">
        <h2>Spam Detection</h2>

        <div class="setting-row">
          <label for="spam-threshold">
            <span class="setting-name">Spam threshold</span>
            <span class="setting-description">Max identical messages before marking as spam</span>
          </label>
          <div class="input-group">
            <input type="range" id="spam-threshold" min="1" max="10" value="3">
            <span class="value-display" id="spam-threshold-value">3</span>
          </div>
        </div>

        <div class="setting-row">
          <label for="duplicate-window">
            <span class="setting-name">Duplicate window</span>
            <span class="setting-description">Time window (seconds) for duplicate detection</span>
          </label>
          <div class="input-group">
            <input type="range" id="duplicate-window" min="10" max="120" step="5" value="30">
            <span class="value-display" id="duplicate-window-value">30s</span>
          </div>
        </div>

        <div class="setting-row">
          <label for="inactivity-timeout">
            <span class="setting-name">Inactivity timeout</span>
            <span class="setting-description">Seconds without new messages before showing "stream ended?" prompt</span>
          </label>
          <div class="input-group">
            <input type="range" id="inactivity-timeout" min="30" max="600" step="30" value="120">
            <span class="value-display" id="inactivity-timeout-value">120s</span>
          </div>
        </div>
      </section>

      <!-- Sentiment Analysis -->
      <section class="setting-group">
        <h2>Sentiment Analysis</h2>

        <div class="setting-row">
          <label for="sentiment-sensitivity">
            <span class="setting-name">Sensitivity</span>
            <span class="setting-description">Minimum sentiment signals before declaring mood</span>
          </label>
          <div class="input-group">
            <input type="range" id="sentiment-sensitivity" min="1" max="10" value="3">
            <span class="value-display" id="sentiment-sensitivity-value">3</span>
          </div>
        </div>

        <div class="setting-row">
          <label for="mood-upgrade-threshold">
            <span class="setting-name">Mood upgrade threshold</span>
            <span class="setting-description">Score threshold for excited/angry mood (higher = stricter)</span>
          </label>
          <div class="input-group">
            <input type="range" id="mood-upgrade-threshold" min="10" max="50" step="5" value="30">
            <span class="value-display" id="mood-upgrade-threshold-value">30</span>
          </div>
        </div>
      </section>

      <!-- AI Summaries -->
      <section class="setting-group">
        <h2>AI Summaries</h2>
        <div class="setting-row">
          <label for="ai-summaries-toggle">
            <span class="setting-name">Enable AI summaries</span>
            <span class="setting-description">Downloads a ~400MB language model for richer summaries and mood analysis. All processing is local.</span>
          </label>
          <div class="input-group">
            <label class="toggle">
              <input type="checkbox" id="ai-summaries-toggle">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
      </section>

      <!-- Encoder Info -->
      <section class="setting-group">
        <h2>Encoder Info</h2>

        <div class="setting-row">
          <label>
            <span class="setting-name">Encoding backend</span>
            <span class="setting-description">Which compute backend the semantic encoder is using</span>
          </label>
          <div class="input-group">
            <span id="encoder-backend-value" class="value-display">—</span>
          </div>
        </div>
      </section>

      <!-- Actions -->
      <div class="actions">
        <button type="button" id="reset-btn" class="btn btn-secondary">Reset to Defaults</button>
        <button type="submit" id="save-btn" class="btn btn-primary">Save Settings</button>
      </div>

      <div id="status" class="status hidden"></div>
    </form>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
